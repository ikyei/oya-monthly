name: Build OYA Monthly Report

on:
  schedule:
    - cron: '0 23 5 * *'   # 11pm UTC on the 5th of every month
  push:
    paths:
      - 'data/**.json'
      - 'build.js'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'process-month'
        type: choice
        options:
          - process-month
          - setup-baseline
      month:
        description: 'Month to process (e.g. 2026-02). Only used for process-month, leave blank for prior month.'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PYTHON: Run process.py ─────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run process.py
        run: |
          ACTION="${{ github.event.inputs.action }}"

          if [ "$ACTION" = "setup-baseline" ]; then
            echo "Running setup-baseline..."
            python process.py setup-baseline
          else
            if [ -n "${{ github.event.inputs.month }}" ]; then
              MONTH="${{ github.event.inputs.month }}"
            else
              MONTH=$(python3 -c "
          from datetime import date, timedelta
          today = date.today()
          first = today.replace(day=1)
          prev = first - timedelta(days=1)
          print(prev.strftime('%Y-%m'))
          ")
            fi
            echo "Processing month: $MONTH"
            python process.py $MONTH
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── NODE: Build PPTX + HTML (skip for setup-baseline) ─────────────────
      - name: Setup Node.js
        if: github.event.inputs.action != 'setup-baseline'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        if: github.event.inputs.action != 'setup-baseline'
        run: npm install

      - name: Build PPTX and HTML
        if: github.event.inputs.action != 'setup-baseline'
        run: node build.js
        env:
          BUILD_MONTH: ${{ github.event.inputs.month }}

      # ── PDF: Convert PPTX → PDF ───────────────────────────────────────────
      - name: Convert PPTX to PDF
        if: github.event.inputs.action != 'setup-baseline'
        run: |
          sudo apt-get install -y libreoffice --no-install-recommends -qq
          if [ -n "${{ github.event.inputs.month }}" ]; then
            PPTX="reports/${{ github.event.inputs.month }}.pptx"
          else
            PPTX=$(ls -t reports/*.pptx | head -1)
          fi
          echo "Converting: $PPTX"
          libreoffice --headless --convert-to pdf "$PPTX" --outdir reports/
      # ── COMMIT ────────────────────────────────────────────────────────────
      - name: Commit outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html reports/ data/
          git diff --staged --quiet || git commit -m "Auto-build: $(date +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase
          git push
